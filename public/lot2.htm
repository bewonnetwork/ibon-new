<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBON Lottery Arena</title>
  <style>
    :root{
      --gold:#facc15;
      --cyan:#67e8f9;
      --green:#4ade80;
      --purple:#c084fc;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
    body{
      background:linear-gradient(135deg,#0a051f,#1a0f3d);
      color:#e2e8f0;
      min-height:100vh;
    }
    .header{
      background:linear-gradient(90deg,#1e1238,#0f172a);
      padding:20px;
      text-align:center;
      font-size:28px;
      font-weight:900;
      color:var(--gold);
      border-bottom:4px solid var(--gold);
      text-shadow:0 0 20px var(--gold);
    }
    .container{padding:15px; max-width:700px; margin:0 auto;}
    .card{
      background:linear-gradient(145deg,#1e1238,#0f172a);
      border-radius:24px;
      padding:22px;
      margin-bottom:20px;
      border:2px solid rgba(250,204,21,0.3);
      box-shadow:0 10px 40px rgba(0,0,0,0.6);
      position:relative;
      overflow:hidden;
    }
    .balance-box{
      background:rgba(103,232,249,0.1);
      border:2px solid var(--cyan);
      padding:18px;
      border-radius:20px;
      text-align:center;
      margin-bottom:20px;
    }
    .tab-btn{
      padding:12px 24px;
      margin:5px;
      background:#1e1238;
      border-radius:50px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }
    .tab-btn.active{
      background:linear-gradient(90deg,var(--gold),#f59e0b);
      color:#000;
      transform:scale(1.1);
    }
    .quick-btn{
      background:#1e1238;
      border:2px solid var(--purple);
      color:white;
      padding:14px 20px;
      margin:6px;
      border-radius:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }
    .quick-btn:active{ transform:scale(0.92); background:var(--purple); }
    .countdown{
      font-size:34px;
      font-weight:900;
      color:var(--green);
      text-align:center;
      padding:22px;
      background:rgba(0,0,0,0.4);
      border-radius:20px;
      text-shadow:0 0 25px var(--green);
    }
    .prize-pool{
      font-size:30px;
      color:var(--gold);
      text-align:center;
      font-weight:bold;
    }
    .wheel{
      width:280px; height:280px;
      margin:25px auto;
      border:20px solid var(--gold);
      border-radius:50%;
      background:conic-gradient(#facc15,#c084fc,#67e8f9,#4ade80,#facc15);
      position:relative;
      box-shadow:0 0 50px rgba(250,204,21,0.9),
                 inset 0 0 40px rgba(255,255,255,0.4);
      transition: transform 5.5s cubic-bezier(0.25,0.1,0.25,1);
    }
    .wheel-center{
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:80px; height:80px; background:#000; border:10px solid #fff;
      border-radius:50%; box-shadow:0 0 25px rgba(255,255,255,0.9);
    }
    .primary{
      background:linear-gradient(90deg,#facc15,#eab308);
      color:#000;
      padding:18px;
      font-size:20px;
      font-weight:900;
      border:none;
      border-radius:18px;
      width:100%;
      margin-top:15px;
      box-shadow:0 8px 30px rgba(250,204,21,0.6);
    }
    .ticket-item{
      background:rgba(30,18,56,0.9);
      padding:15px;
      margin:10px 0;
      border-radius:16px;
      border-left:6px solid var(--cyan);
    }
  </style>
</head>
<body>

<div class="header">🎟️ IBON LOTTERY ARENA</div>

<div class="container">

  <!-- USDT Balance -->
  <div class="card balance-box">
    <div style="color:#67e8f9;font-size:15px;">Your USDT Balance</div>
    <div style="font-size:36px;font-weight:bold;color:#67e8f9;" id="usdtBalance">0.00 USDT</div>
  </div>

  <!-- Tabs -->
  <div class="card" id="tabs"></div>

  <!-- Prize Pool -->
  <div class="card">
    <h2 style="text-align:center;color:var(--gold);">💰 Total Prize Pool</h2>
    <div class="prize-pool" id="prizePool">0 USDT</div>
  </div>

  <!-- Countdown -->
  <div class="card">
    <h2 id="lotteryTitle" style="text-align:center;color:var(--cyan);">Next Draw</h2>
    <div class="countdown" id="countdown">00h 00m 00s</div>
  </div>

  <!-- Buy Tickets -->
  <div class="card">
    <h2 style="text-align:center;margin-bottom:15px;">🎟️ Buy Tickets</h2>
    <p id="ticketPrice" style="text-align:center;font-size:19px;color:#facc15;">1 Ticket = 25 USDT</p>

    <div id="quickButtons" style="text-align:center;margin:15px 0;"></div>

    <input type="number" id="ticketQty" value="1" min="1" 
      style="width:100%;padding:18px;font-size:22px;background:#1e1238;color:white;border:3px solid #c084fc;border-radius:18px;text-align:center;">

    <button class="primary" onclick="buyTickets()">BUY TICKETS NOW</button>
  </div>

  <!-- My Tickets -->
  <div class="card">
    <h2>My Tickets (<span id="myTicketCount">0</span>)</h2>
    <div id="myTicketsList"></div>
  </div>

  <!-- Spin Wheel -->
  <div class="card" style="text-align:center;">
    <h2>🎰 Live Draw</h2>
    <div class="wheel" id="wheel"><div class="wheel-center"></div></div>
    <button onclick="startDraw()" class="primary" style="background:#22c55e;color:white;">START DRAW (Admin)</button>
  </div>

</div>

<script type="module">
import { getFirestore, doc, updateDoc, addDoc, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const db = getFirestore();
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || {};
let currentType = "weekly";
let tickets = [];

const lotteryConfig = {
  hourly:  { price: 5,  title: "Hourly Draw" },
  daily:   { price: 10, title: "Daily Draw" },
  weekly:  { price: 25, title: "Weekly Draw" },
  monthly: { price: 100,title: "Monthly Draw" }
};

function createTabs() {
  const container = document.getElementById("tabs");
  Object.keys(lotteryConfig).forEach(type => {
    const btn = document.createElement("span");
    btn.className = tab-btn ${type === currentType ? 'active' : ''};
    btn.textContent = type.toUpperCase();
    btn.onclick = () => switchLottery(type);
    container.appendChild(btn);
  });
}

function switchLottery(type) {
  currentType = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    if(b.textContent.toLowerCase() === type) b.classList.add('active');
  });

  document.getElementById("lotteryTitle").textContent = lotteryConfig[type].title;
  document.getElementById("ticketPrice").textContent = 1 Ticket = ${lotteryConfig[type].price} USDT;
  loadMyTickets();
}

function createQuickButtons() {
  const container = document.getElementById("quickButtons");
  const amounts = [1, 5, 10, 25, 50];
  container.innerHTML = "";
  amounts.forEach(num => {
    const btn = document.createElement("span");
    btn.className = "quick-btn";
    btn.textContent = num + " Tickets";
    btn.onclick = () => document.getElementById("ticketQty").value = num;
    container.appendChild(btn);
  });
}

async function buyTickets() {
  const qty = parseInt(document.getElementById("ticketQty").value) || 1;
  const price = lotteryConfig[currentType].price;
  const totalCost = qty * price;

  if (totalCost > (currentUser.usdt || 0)) {
    alert("❌ Not enough USDT balance!");
    return;
  }

  if (confirm(Buy ${qty} ${currentType} ticket(s) for ${totalCost} USDT?)) {
    currentUser.usdt -= totalCost;

    for (let i = 0; i < qty; i++) {
      const ticketId = TKT-\( {currentType.toUpperCase()}- \){Date.now().toString().slice(-6)};
      await addDoc(collection(db, "lottery_tickets"), {
        uid: currentUser.uid,
        username: currentUser.username,
        ticketId: ticketId,
        type: currentType,
        date: new Date().toISOString()
      });
    }

    await updateDoc(doc(db, "users", currentUser.uid), { usdt: currentUser.usdt });
    alert(🎉 ${qty} Tickets Purchased Successfully!);
    loadMyTickets();
  }
}

function startCountdown() {
  let time = 3600;
  const el = document.getElementById("countdown");
  setInterval(() => {
    if (time <= 0) time = 3600;
    const h = Math.floor(time / 3600);
    const m = Math.floor((time % 3600) / 60);
    const s = time % 60;
    el.textContent = ${h.toString().padStart(2,'0')}h ${m.toString().padStart(2,'0')}m ${s.toString().padStart(2,'0')}s;
    time--;
  }, 1000);
}

async function loadMyTickets() {
  const q = query(collection(db, "lottery_tickets"), 
    where("uid", "==", currentUser.uid), 
    where("type", "==", currentType)
  );
  onSnapshot(q, (snap) => {
    tickets = snap.docs.map(d => d.data());
    document.getElementById("myTicketCount").textContent = tickets.length;
    
    let html = "";
    tickets.forEach(t => {
      html += <div class="ticket-item">🎟️ \( {t.ticketId}<br><small> \){new Date(t.date).toLocaleString()}</small></div>;
    });
    document.getElementById("myTicketsList").innerHTML = html || 
      "<p style='text-align:center;color:#64748b;padding:30px;'>No tickets yet</p>";
  });
}

window.startDraw = function() {
  const wheel = document.getElementById("wheel");
  wheel.style.transform = rotate(${Math.random() * 4000 + 2500}deg);
  
  setTimeout(() => {
    if (tickets.length > 0) {
      const winner = tickets[Math.floor(Math.random() * tickets.length)];
      alert(🎊 WINNER: \( {winner.ticketId} ( \){winner.username}));
    } else {
      alert("No tickets sold yet!");
    }
  }, 5500);
};

// Initialize
createTabs();
createQuickButtons();
switchLottery("weekly");
document.getElementById("usdtBalance").textContent = Number(currentUser.usdt || 0).toFixed(2) + " USDT";
loadMyTickets();
startCountdown();
</script>

</body>
</html>
