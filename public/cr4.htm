<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crash Game - IBON Global</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0b1120;--surface:#111827;--card:#1a2435;--border:#1e3050;
  --accent:#f59e0b;--green:#10b981;--red:#ef4444;--text:#f1f5f9;--muted:#64748b;--cyan:#06b6d4;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100vh;}

.header{background:var(--surface);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;color:var(--accent);}
.live-badge{background:linear-gradient(135deg,#1877f2,#0a52c7);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* HISTORY BAR */
.hist-bar{background:var(--surface);display:flex;gap:5px;padding:7px 12px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);align-items:center;}
.hist-bar::-webkit-scrollbar{display:none;}
.h-label{font-size:10px;color:var(--muted);font-weight:700;white-space:nowrap;margin-right:4px;}
.hp{border-radius:14px;padding:3px 9px;font-size:11px;font-weight:800;white-space:nowrap;}
.hp.g{background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3);}
.hp.r{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);}

/* CHART */
.chart-wrap{position:relative;height:260px;background:var(--bg);overflow:hidden;flex-shrink:0;}
#cvs{display:block;width:100%;height:100%;}

.mult-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-65%);text-align:center;pointer-events:none;z-index:5;}
.mult-num{font-family:'Orbitron',sans-serif;font-size:52px;font-weight:900;color:#fff;line-height:1;text-shadow:0 0 30px rgba(245,158,11,0.6);}
.mult-num.crashed{color:var(--red);text-shadow:0 0 30px rgba(239,68,68,0.7);}
.mult-num.safe{color:var(--green);text-shadow:0 0 30px rgba(16,185,129,0.7);}
.mult-tag{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:2px;margin-top:4px;}
.mult-profit{font-size:18px;font-weight:800;color:var(--green);margin-top:6px;font-family:'Orbitron',sans-serif;}

#rocketEl{position:absolute;pointer-events:none;z-index:10;width:64px;height:64px;transform-origin:50% 80%;filter:drop-shadow(0 4px 12px rgba(245,158,11,0.8));display:none;}

.crash-overlay{position:absolute;inset:0;background:rgba(11,17,32,0.85);display:none;align-items:center;justify-content:center;z-index:20;}
.crash-box{text-align:center;}
.crash-big{font-family:'Orbitron',sans-serif;font-size:38px;font-weight:900;color:var(--red);animation:crashIn 0.3s ease;text-shadow:0 0 30px rgba(239,68,68,0.8);}
.crash-sub{font-size:16px;color:#f87171;margin-top:6px;font-weight:700;}
@keyframes crashIn{0%{transform:scale(1.8);opacity:0;}100%{transform:scale(1);opacity:1;}}

.wait-overlay{position:absolute;inset:0;background:rgba(11,17,32,0.88);display:flex;align-items:center;justify-content:center;z-index:20;}
.wait-box{text-align:center;}
.wait-label{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:1px;}
.wait-count{font-family:'Orbitron',sans-serif;font-size:52px;font-weight:900;color:var(--accent);}
.wait-bets{font-size:12px;color:var(--green);margin-top:4px;}

.content{flex:1;overflow-y:auto;padding-bottom:20px;}

/* BET PANEL */
.bet-panel{background:var(--surface);padding:14px;border-bottom:1px solid var(--border);}
.bal-row{background:linear-gradient(135deg,rgba(16,185,129,0.12),rgba(16,185,129,0.05));border:1px solid rgba(16,185,129,0.25);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.bal-left{display:flex;align-items:center;gap:8px;}
.bal-icon{font-size:20px;}
.bal-lbl{font-size:10px;color:#4ade80;font-weight:700;}
.bal-val{font-size:18px;font-weight:900;color:#fff;}
.bal-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.refresh-btn{background:rgba(16,185,129,0.15);border:none;border-radius:8px;color:#4ade80;font-size:16px;padding:6px 10px;cursor:pointer;}

.main-btn{width:100%;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;letter-spacing:0.5px;transition:all 0.15s;}
.main-btn.place{background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 4px 16px rgba(245,158,11,0.35);}
.main-btn.cashout{background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 4px 16px rgba(16,185,129,0.35);}
.main-btn.waiting{background:var(--card);color:var(--muted);}
.main-btn:disabled{opacity:0.5;cursor:not-allowed;}
.main-btn:not(:disabled):active{transform:scale(0.97);}

.bet-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.field{background:var(--card);border-radius:10px;padding:10px 12px;border:1px solid var(--border);}
.field-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.8px;margin-bottom:5px;}
.field-inner{display:flex;align-items:center;gap:4px;}
.field-prefix{font-size:13px;color:var(--muted);font-weight:700;}
.field input{background:transparent;border:none;color:var(--text);font-size:16px;font-weight:800;outline:none;width:100%;}
.quick-btns{display:flex;gap:5px;margin-top:8px;}
.qb{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;font-weight:700;padding:7px 4px;cursor:pointer;text-align:center;}
.qb:hover{background:var(--border);color:var(--text);}

/* COMPANY PROFIT STRIP */
.profit-strip{background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(245,158,11,0.05));border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:8px 14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
.profit-strip .ps-label{font-size:10px;color:var(--muted);}
.profit-strip .ps-val{font-size:13px;font-weight:800;color:var(--accent);}

/* PLAYERS */
.players-section{padding:14px;}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.section-head h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}
.badge{background:rgba(245,158,11,0.15);color:var(--accent);font-size:10px;border-radius:10px;padding:2px 8px;font-weight:800;}
.players-table{background:var(--surface);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.pt-header{display:grid;grid-template-columns:1fr 70px 70px;padding:8px 14px;background:var(--card);font-size:10px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);}
.pt-row{display:grid;grid-template-columns:1fr 70px 70px;padding:10px 14px;border-bottom:1px solid rgba(30,48,80,0.5);align-items:center;}
.pt-row:last-child{border-bottom:none;}
.pt-name{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;}
.pt-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;}
.pt-bet{font-size:12px;font-weight:700;text-align:right;}
.pt-cash{font-size:12px;font-weight:700;text-align:right;}
.pt-cash.win{color:var(--green);}
.pt-cash.pending{color:var(--muted);}
.pt-cash.lost{color:var(--red);}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-weight:700;font-size:13px;opacity:0;transition:all 0.3s;z-index:100;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.red{background:var(--red);}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.loading-spinner{width:48px;height:48px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div style="color:var(--muted);font-size:13px;font-weight:700;">Loading...</div>
</div>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="logo-icon">🚀</div>

</div>

<!-- SHARED HISTORY BAR -->
<div class="hist-bar" id="historyBar">

</div>

<div class="chart-wrap">
  <canvas id="cvs"></canvas>

  <!-- ROCKET SVG -->
  <svg id="rocketEl" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="rg1" cx="35%" cy="25%" r="70%">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>

        <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>

    <path d="M42 30 L50 42 L42 38 Z" fill="url(#rg1)"/>
    <ellipse cx="32" cy="36" rx="10" ry="3" fill="#78350f"/>
  </svg>

  <div class="mult-overlay">
    <div class="mult-num" id="multNum">1.00x</div>
    <div class="mult-tag" id="multTag">CURRENT PAYOUT</div>
    <div class="mult-profit" id="multProfit" style="display:none"></div>
  </div>

  <div class="crash-overlay" id="crashOverlay">
    <div class="crash-box">
      <div class="crash-big">💥 CRASHED!</div>
      <div class="crash-sub" id="crashSub"></div>
    </div>
  </div>

  <div class="wait-overlay" id="waitOverlay">
    <div class="wait-box">
      <div class="wait-label">NEXT ROUND IN</div>
      <div class="wait-count" id="waitCount">5</div>
      <div class="wait-bets" id="waitBets">Place Your Bet!</div>
    </div>
  </div>
</div>

<div class="content">
  <div class="bet-panel">

    <!-- BALANCE -->
    <div class="bal-row">
      <div class="bal-left">
        <span class="bal-icon">💵</span>
        <div>
          <div class="bal-lbl">USDT BALANCE</div>
          <div class="bal-val" id="balDisplay">Loading...</div>
          <div class="bal-sub" id="balUserName"></div>

    <div class="bet-fields">

      <button class="qb" onclick="setBet(50)">$50</button>
      <button class="qb" onclick="halveBet()">½</button>

      <div style="text-align:right;">
        <div class="ps-label">🏢 Company Takes</div>

    <div class="players-table">
      <div class="pt-header">

      </div>
      <div id="playerList"></div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, updateDoc, addDoc,
  collection, onSnapshot, setDoc, getDocs, orderBy, query, limit
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJy6aqn6xUZrL2uDa1jDRYOmyAk--zlFw",
  authDomain: "ibon-f2c25.firebaseapp.com",
  projectId: "ibon-f2c25",
  storageBucket: "ibon-f2c25.firebasestorage.app",
  messagingSenderId: "709726773992",
  appId: "1:709726773992:web:394c54e6c558a8b21d5f5d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =============================================
// USER & BALANCE
// =============================================
let currentUser = null;
let userBalance = 0;
let adminCrashPoint = null;
let adminProfitPercent = 20; // default 20% company profit

function loadUser(){
  try{
    const stored = localStorage.getItem("currentUser");
    if(stored){
      currentUser = JSON.parse(stored);
      userBalance = Number(currentUser.usdt) || 0;
      document.getElementById("balDisplay").textContent = "$" + userBalance.toFixed(2);
      document.getElementById("balUserName").textContent = "👤 " + (currentUser.username||"");
    } else {
      document.getElementById("balDisplay").textContent = "Login Required";
    }
  }catch(e){ console.log(e); }
  updateBtn();
}

window.refreshBalance = async function(){
  if(!currentUser?.uid){ showToast("Please Login First","red"); return; }
  try{
    const snap = await getDoc(doc(db,"users",currentUser.uid));
    if(snap.exists()){
      const data = snap.data();
      userBalance = Number(data.usdt)||0;
      currentUser.usdt = userBalance;
      localStorage.setItem("currentUser",JSON.stringify(currentUser));
      document.getElementById("balDisplay").textContent = "$" + userBalance.toFixed(2);
      showToast("✓ Balance Updated");
    }
  }catch(e){ showToast("Failed","red"); }
}

// =============================================
// ADMIN SETTINGS LISTENER
// =============================================
function listenAdminSettings(){
  onSnapshot(doc(db,"settings","crashGame"),(snap)=>{
    if(snap.exists()){
      const data = snap.data();
      // Admin set crash point
      if(data.nextCrashAt && Number(data.nextCrashAt) >= 1.01){
        adminCrashPoint = Math.min(25, parseFloat(data.nextCrashAt)); // MAX 25x enforce
      } else {
        adminCrashPoint = null;
      }
      // Company profit %
      if(data.profitPercent){
        adminProfitPercent = Math.min(50, Math.max(10, Number(data.profitPercent)));
      }
    }
  });
}

// =============================================
// SHARED HISTORY — Last 20 from Firebase
// =============================================
function listenSharedHistory(){
  const q = query(collection(db,"crashHistory"), orderBy("createdAt","desc"), limit(20));
  onSnapshot(q,(snap)=>{
    const bar = document.getElementById("historyBar");
    // clear old chips
    bar.querySelectorAll(".hp").forEach(e=>e.remove());
    const docs = [];
    snap.forEach(d=>docs.push(d.data()));
    // newest first already
    docs.forEach(d=>{
      const s = document.createElement("span");
      const val = parseFloat(d.crashPoint||1);
      s.className = "hp " + (val >= 2 ? "g" : "r");
      s.textContent = val.toFixed(2) + "x";
      bar.appendChild(s);
    });
  });
}

// =============================================
// FAKE PLAYERS
// =============================================
const fakeNames = [
  'Rahul_BET','Sohel99','Naeem_WIN','Taher78','Rakib786','Sumon_PRO',
  'Dipu44','Arif_Bhai','Sharif_X','Bappi01','Rony_222','Nasir99',
  'Hasan_BET','Sajal_Khan','Imon55','Mehedi_X','Tanvir88','Farhan_VIP',
  'Sabbir_K','Asif007','Habib_Raj','Mamun_22','Riyad_Pro','Shanto99',
  'Niloy_BD','Ovi_King','Tamim_77','Shawon_X','Antu_Bhai','Selim_45',
  'Jewel_Pro','Rafsan_K','Saad_VIP','Tuhin99','Zihad_BET','Kamal_88',
  'Faysal_X','Robin_22','Sumit_Raj','Anik_007','Tariq_BD','Sazzad99',
  'Munna_K','Forhad_X','Babu_VIP','Sagor_77','Ridoy_Pro','Limon_88',
  'Akash_BD','Pavel99','Jubaer_X','Imran_Pro','Rubel_77','Mizan_BET'
];

// Realistic bet amounts — mixed like real players
const fakeBetAmounts = [4,6,7,10,13,15,17,20,25,30,40,44,50,60,70,75,100,120,150,175,200,250,300,400,500,700];
const avatarColors = ['#f59e0b','#10b981','#06b6d4','#8b5cf6','#ec4899','#ef4444','#3b82f6','#22c55e','#eab308','#f472b6'];

let fakePlayers = [];
let usedNameIndices = [];

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function genFakePlayers(){
  fakePlayers = [];
  usedNameIndices = [];
  const count = 12 + Math.floor(Math.random()*10); // 12-22 players
  const shuffledIdx = shuffleArray([...Array(fakeNames.length).keys()]);

  for(let i=0;i<count;i++){
    const nameIdx = shuffledIdx[i % shuffledIdx.length];
    // Pick random bet — realistic values
    const bet = fakeBetAmounts[Math.floor(Math.random()*fakeBetAmounts.length)];
    // Auto cashout between 1.2x and 8x
    const auto = parseFloat((1.2 + Math.random()*6.8).toFixed(2));
    fakePlayers.push({
      name: fakeNames[nameIdx],
      bet, auto,
      color: avatarColors[Math.floor(Math.random()*avatarColors.length)],
      cashedAt: null,
      lost: false
    });
  }
  renderPlayers();
}

function tickFakePlayers(){
  fakePlayers.forEach(p=>{
    if(!p.cashedAt && !p.lost && mult >= p.auto){
      p.cashedAt = p.auto.toFixed(2);
    }
  });
  renderPlayers();
}

function crashFakePlayers(){
  fakePlayers.forEach(p=>{ if(!p.cashedAt) p.lost = true; });
  renderPlayers();
}

// =============================================
// COMPANY PROFIT LOGIC
// =============================================
let roundTotalBet = 0;
let roundCompanyProfit = 0;
let roundActualCrash = 2.0; // the real crash after company takes cut

function calcCompanyProfit(){
  // Random profit between 10% - 50%
  const randProfit = 10 + Math.floor(Math.random()*41); // 10 to 50
  // Use admin set or random
  const profitPct = adminProfitPercent || randProfit;
  roundTotalBet = fakePlayers.reduce((a,p)=>a+p.bet, 0) + (betPlaced ? currentBet : 0);
  roundCompanyProfit = roundTotalBet * (profitPct/100);

  document.getElementById("roundTotalBet").textContent = "$" + roundTotalBet.toFixed(2);
  document.getElementById("companyProfit").textContent = "$" + roundCompanyProfit.toFixed(2) + " (" + profitPct + "%)";
}

// =============================================
// RENDER PLAYERS
// =============================================
function renderPlayers(){
  const list = document.getElementById("playerList");
  const totalFake = fakePlayers.reduce((a,p)=>a+p.bet,0);
  const totalBet = totalFake + (betPlaced ? currentBet : 0);
  document.getElementById("ptotal").textContent = "$"+totalBet.toFixed(2);
  document.getElementById("pcBadge").textContent = fakePlayers.length + (betPlaced?1:0);

  let html = "";

  // Real user always on top
  if(currentUser){
    const uname = currentUser.username||"You";
    const uinit = uname[0].toUpperCase();
    let myBetText = betPlaced ? $${currentBet.toFixed(2)} : <span style="color:var(--muted);font-size:11px">—</span>;
    let myStatus = "";
    if(betPlaced){
      if(cashedOut) myStatus = <span class="pt-cash win">×${mult.toFixed(2)}</span>;
      else if(gameState==="crashed") myStatus = <span class="pt-cash lost">BUST</span>;
      else myStatus = <span class="pt-cash pending">—</span>;
    } else {
      myStatus = <span class="pt-cash pending">—</span>;
    }
    html += `<div class="pt-row" style="background:rgba(245,158,11,0.1);border-left:3px solid var(--accent);">
      <span class="pt-name">
        <span class="pt-avatar" style="background:#f59e0b">${uinit}</span>
        ${uname}
        <span style="background:rgba(245,158,11,0.25);color:var(--accent);font-size:9px;font-weight:800;padding:1px 5px;border-radius:6px;margin-left:3px;">YOU</span>
      </span>
      <span class="pt-bet">${myBetText}</span>
      ${myStatus}
    </div>`;
  }

  fakePlayers.forEach(p=>{
    const init = p.name[0].toUpperCase();
    let cashHtml = p.cashedAt
      ? <span class="pt-cash win">×${p.cashedAt}</span>
      : p.lost
      ? <span class="pt-cash lost">BUST</span>
      : <span class="pt-cash pending">—</span>;
    html += `<div class="pt-row">
      <span class="pt-name"><span class="pt-avatar" style="background:${p.color}">${init}</span>${p.name}</span>
      <span class="pt-bet">$${p.bet}</span>${cashHtml}
    </div>`;
  });

  list.innerHTML = html;
}

// =============================================
// CANVAS CHART
// =============================================
const cvs = document.getElementById("cvs");
const gctx = cvs.getContext("2d");
const pts = [];

function resizeCvs(){
  cvs.width = cvs.offsetWidth;
  cvs.height = cvs.offsetHeight;
}
resizeCvs();
window.addEventListener("resize",resizeCvs);

function drawChart(){
  const W=cvs.width, H=cvs.height;
  gctx.clearRect(0,0,W,H);
  if(pts.length<2) return;
  const pL=36,pB=28,pR=16,pT=16;
  const cW=W-pL-pR, cH=H-pB-pT;
  const maxX=Math.max(...pts.map(p=>p.x),1);
  const maxY=Math.max(...pts.map(p=>p.y),2.5);

  // Grid lines
  gctx.strokeStyle="rgba(255,255,255,0.04)";
  gctx.lineWidth=1;
  [1,1.5,2,3,5,10,15,20,25].forEach(v=>{
    if(v>maxY*1.1) return;
    const y=pT+cH-((v-1)/Math.max(maxY-1,1))*cH;
    gctx.beginPath(); gctx.moveTo(pL,y); gctx.lineTo(W-pR,y); gctx.stroke();
    gctx.fillStyle="rgba(255,255,255,0.2)";
    gctx.font="9px Inter";
    gctx.fillText(v+"x",2,y+3);
  });

  const gf=gctx.createLinearGradient(0,pT,0,H-pB);
  gf.addColorStop(0,gameState==="crashed"?"rgba(239,68,68,0.25)":"rgba(245,158,11,0.25)");
  gf.addColorStop(1,"rgba(11,17,32,0)");

  gctx.beginPath();
  pts.forEach((p,i)=>{
    const x=pL+(p.x/maxX)*cW;
    const y=pT+cH-((p.y-1)/Math.max(maxY-1,1))*cH;
    i===0?gctx.moveTo(x,y):gctx.lineTo(x,y);
  });
  const lx=pL+(pts[pts.length-1].x/maxX)*cW;
  gctx.lineTo(lx,H-pB); gctx.lineTo(pL,H-pB); gctx.closePath();
  gctx.fillStyle=gf; gctx.fill();

  gctx.beginPath();
  gctx.strokeStyle=gameState==="crashed"?"#ef4444":"#f59e0b";
  gctx.lineWidth=3; gctx.lineJoin="round"; gctx.lineCap="round";
  pts.forEach((p,i)=>{
    const x=pL+(p.x/maxX)*cW;
    const y=pT+cH-((p.y-1)/Math.max(maxY-1,1))*cH;
    i===0?gctx.moveTo(x,y):gctx.lineTo(x,y);
  });
  gctx.stroke();

  if(gameState==="flying" && pts.length>1){
    const last=pts[pts.length-1];
    const rx=pL+(last.x/maxX)*cW;
    const ry=pT+cH-((last.y-1)/Math.max(maxY-1,1))*cH;
    gctx.beginPath(); gctx.arc(rx,ry,5,0,Math.PI*2);
    gctx.fillStyle="#f59e0b"; gctx.fill();
    const rkt=document.getElementById("rocketEl");
    rkt.style.left=(rx-22)+"px"; rkt.style.top=(ry-52)+"px";
    if(pts.length>2){
      const prev=pts[pts.length-3];
      const dx=(last.x-prev.x)/maxX*cW;
      const dy=-((last.y-prev.y)/Math.max(maxY-1,1))*cH;
      const angle=Math.atan2(dy,dx)*180/Math.PI-90;
      rkt.style.transform=rotate(${Math.max(-60,Math.min(-10,angle))}deg);
    }
  }
}

// =============================================
// GAME STATE
// =============================================
let gameState="waiting";
let mult=1.0;
let crashAt=2.0;
let animId=null;
let t0=null;
let betPlaced=false;
let cashedOut=false;
let currentBet=0;
let waitSec=5;
let waitInterval=null;

// CRASH POINT GENERATOR — MAX 25x HARD LIMIT
function genCrash(){
  // Admin set করলে সেটা use করো (already capped at 25 in listener)
  if(adminCrashPoint !== null){
    const val = Math.min(25, Math.max(1.01, adminCrashPoint));
    return val;
  }

  // Company profit logic:
  // 10-50% random profit রেখে crash করবে
  // মানে total bet এর max 80-90% কে পুরো কেউ জিততে পারবে না
  const r = Math.random();

  // 5% chance: instant crash at 1.00 (no profit)
  if(r < 0.05) return 1.00;

  // 15% chance: very low 1.01-1.30
  if(r < 0.20) return parseFloat((1.01 + Math.random()*0.29).toFixed(2));

  // 35% chance: low-medium 1.30-3.00
  if(r < 0.55) return parseFloat((1.30 + Math.random()*1.70).toFixed(2));

  // 25% chance: medium 3.00-8.00
  if(r < 0.80) return parseFloat((3.00 + Math.random()*5.00).toFixed(2));

  // 15% chance: high 8.00-15.00
  if(r < 0.95) return parseFloat((8.00 + Math.random()*7.00).toFixed(2));

  // 5% chance: very high but MAX 25x
  return parseFloat((15.00 + Math.random()*10.00).toFixed(2));
  // All values already <= 25
}

function startRound(){
  pts.length=0; mult=1.0; t0=null; cashedOut=false;

  // Generate crash point — MAX 25x
  crashAt = Math.min(25, genCrash());

  document.getElementById("crashOverlay").style.display="none";
  document.getElementById("waitOverlay").style.display="none";
  document.getElementById("rocketEl").style.display="block";
  document.getElementById("multNum").className="mult-num";
  document.getElementById("multNum").textContent="1.00x";
  document.getElementById("multTag").textContent="CURRENT PAYOUT";
  document.getElementById("multProfit").style.display="none";
  gameState="flying";

  genFakePlayers();
  calcCompanyProfit();
  updateBtn();
  animId=requestAnimationFrame(loop);
}

function loop(ts){
  if(!t0) t0=ts;
  const el=(ts-t0)/1000;
  mult=Math.pow(Math.E, 0.07*el);

  // HARD CAP: never exceed 25x
  if(mult > 25) mult = 25;

  pts.push({x:el, y:mult});
  if(pts.length>400) pts.shift();

  document.getElementById("multNum").textContent=mult.toFixed(2)+"x";

  if(betPlaced && !cashedOut && currentUser){
    const profit=(mult*currentBet-currentBet).toFixed(2);
    document.getElementById("multProfit").textContent="+$"+profit;
    document.getElementById("multProfit").style.display="block";
    const ac=parseFloat(document.getElementById("autoCO").value);
    if(!isNaN(ac) && mult>=ac) doCashout(true);
  }

  tickFakePlayers();

  // Crash if reached crashAt or 25x max
  if(mult >= crashAt || mult >= 25){ doCrash(); return; }

  drawChart();
  animId=requestAnimationFrame(loop);
}

function doCrash(){
  cancelAnimationFrame(animId);
  gameState="crashed";
  document.getElementById("rocketEl").style.display="none";
  document.getElementById("crashOverlay").style.display="flex";
  document.getElementById("crashSub").textContent="Crashed at "+mult.toFixed(2)+"x";
  document.getElementById("multNum").className="mult-num crashed";
  document.getElementById("multProfit").style.display="none";

  // User lost
  if(betPlaced && !cashedOut && currentUser){
    userBalance=Math.max(0,userBalance-currentBet);
    currentUser.usdt=userBalance;
    document.getElementById("balDisplay").textContent="$"+userBalance.toFixed(2);
    showToast("💥 Bust! -$"+currentBet.toFixed(2),"red");
    saveTransaction("Loss", currentBet, mult);
  }

  // Clear admin crash point after use
  if(adminCrashPoint!==null){
    updateDoc(doc(db,"settings","crashGame"),{nextCrashAt:null}).catch(()=>{});
    adminCrashPoint=null;
  }

  // Save to shared Firebase history
  addDoc(collection(db,"crashHistory"),{
    crashPoint: parseFloat(mult.toFixed(2)),
    totalBet: roundTotalBet,
    companyProfit: roundCompanyProfit,
    createdAt: new Date().toISOString()
  }).catch(()=>{});

  crashFakePlayers();
  betPlaced=false; cashedOut=false;
  updateBtn();
  drawChart();
  startWait();
}

function doCashout(auto=false){
  if(cashedOut || !betPlaced || gameState!=="flying") return;
  cashedOut=true;
  const win=parseFloat((mult*currentBet).toFixed(4));
  const profit=parseFloat((win-currentBet).toFixed(4));
  userBalance=parseFloat((userBalance+win).toFixed(4));
  currentUser.usdt=userBalance;
  document.getElementById("balDisplay").textContent="$"+userBalance.toFixed(2);
  showToast((auto?"🤖 Auto":"💰")+" Cashed out ×"+mult.toFixed(2)+" → +$"+profit.toFixed(2));
  document.getElementById("multNum").className="mult-num safe";
  document.getElementById("multProfit").textContent="+$"+profit.toFixed(2);
  saveTransaction("Win",profit,mult);
  updateBtn();
  renderPlayers();
}

function startWait(){
  gameState="waiting";
  waitSec=5;
  document.getElementById("waitOverlay").style.display="flex";
  document.getElementById("waitCount").textContent=waitSec;
  document.getElementById("waitBets").textContent="Place Bet Now!";
  updateBtn();
  waitInterval=setInterval(()=>{
    waitSec--;
    document.getElementById("waitCount").textContent=waitSec;
    if(waitSec<=0){ clearInterval(waitInterval); startRound(); }
  },1000);
}

window.handleBet=function(){
  if(gameState==="flying" && betPlaced && !cashedOut){ doCashout(); return; }
  if(gameState!=="waiting") return;
  if(!currentUser){ showToast("Please Login First","red"); return; }
  const amt=parseFloat(document.getElementById("betAmt").value)||1;
  if(amt<0.1){ showToast("Minimum Bet $0.10","red"); return; }
  if(amt>userBalance){ showToast("Insufficient Balance!","red"); return; }
  currentBet=amt;
  betPlaced=true;
  document.getElementById("waitBets").textContent="✓ Bet Placed: $"+amt.toFixed(2);
  calcCompanyProfit();
  updateBtn();
  renderPlayers();
  showToast("Bet placed: $"+amt.toFixed(2));
}

function updateBtn(){
  const btn=document.getElementById("mainBtn");
  if(gameState==="flying" && betPlaced && !cashedOut){
    btn.className="main-btn cashout";
    btn.textContent="💰 Cash Out ×"+mult.toFixed(2);
    btn.disabled=false;
  } else if(gameState==="waiting"){
    if(betPlaced){
      btn.className="main-btn waiting";
      btn.textContent="⏳ Bet Placed $"+currentBet.toFixed(2);
      btn.disabled=true;
    } else {
      btn.className="main-btn place";
      btn.textContent="▶️ Place Bet";
      btn.disabled=!currentUser;
    }
  } else {
    btn.className="main-btn place";
    btn.textContent="▶️ Place Bet";
    btn.disabled=true;
  }
}

// Update cashout button text in real-time
setInterval(()=>{
  if(gameState==="flying" && betPlaced && !cashedOut){
    document.getElementById("mainBtn").textContent="💰 Cash Out ×"+mult.toFixed(2);
  }
},100);

// =============================================
// SAVE TRANSACTION TO FIREBASE
// =============================================
async function saveTransaction(type, amount, m){
  if(!currentUser?.uid) return;
  try{
    await updateDoc(doc(db,"users",currentUser.uid),{
      usdt: Number(currentUser.usdt)||0
    });
    await addDoc(collection(db,"transactions"),{
      uid: currentUser.uid,
      username: currentUser.username||"",
      type: "Crash "+type,
      text: Crash ${type} @${m.toFixed(2)}x — ${type==="Win"?"+":"-"}$${Math.abs(amount).toFixed(2)},
      amount: Math.abs(amount),
      date: new Date().toLocaleString()
    });
    localStorage.setItem("currentUser",JSON.stringify(currentUser));
  }catch(e){ console.log(e); }
}

// =============================================
// QUICK BET BUTTONS
// =============================================
window.setBet=function(v){ document.getElementById("betAmt").value=v; }
window.halveBet=function(){
  const v=parseFloat(document.getElementById("betAmt").value)||1;
  document.getElementById("betAmt").value=Math.max(0.1,(v/2).toFixed(2));
}
window.dblBet=function(){
  const v=parseFloat(document.getElementById("betAmt").value)||1;
  document.getElementById("betAmt").value=(v*2).toFixed(2);
}
window.goBack=function(){ window.location.href="index.html"; }

// =============================================
// TOAST
// =============================================
window.showToast=function(msg,type="green"){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast show"+(type==="red"?" red":"");
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{ t.className="toast"; },2800);
}

// INIT
// =============================================
loadUser();
listenAdminSettings();
listenSharedHistory();
document.getElementById("loadingScreen").style.display="none";
startWait();
</script>
