<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBON - Admin Login</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e2937);
      color: #e0e7ff;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: rgba(15,23,42,0.95);
      padding: 40px 35px;
      border-radius: 20px;
      border: 2px solid #facc15;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 40px rgba(250,204,21,0.3);
    }
    input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      background: #1e2937;
      border: none;
      border-radius: 999px;
      color: white;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #facc15;
      color: #000;
      border: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 17px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2 style="color:#facc15;margin-bottom:25px;">🔑 ADMIN LOGIN</h2>
  
  <input type="text" id="adminUsername" placeholder="Admin Username" value="admin">
  <input type="password" id="adminPassword" placeholder="Password" value="admin123">
  
  <button onclick="adminLogin()">Login as Admin</button>
  
  <p style="margin-top:20px;font-size:14px;">
    <a href="index.html" style="color:#67e8f9;">← Back to Home</a>
  </p>
</div>

<script>
function adminLogin() {
  const username = document.getElementById('adminUsername').value.trim();
  const password = document.getElementById('adminPassword').value.trim();

  if (username === "admin" && password === "admin123") {
    localStorage.setItem("isAdminLoggedIn", "true");
    window.location.href = "admin.html";
  } else {
    alert("❌ Wrong Credentials!\n\nDefault Login:\nUsername: admin\nPassword: admin123");
  }
}
</script>
</body>
</html>
