<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>IBON - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
background:
radial-gradient(circle at top,#0f172a,#020617 60%);
color:#e5f0ff;
}

/* HEADER */

.top-header{
width:100%;
max-width:900px;
padding:15px 16px;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
}

.logo-main{
width:65px;
height:65px;
border-radius:50%;
object-fit:cover;
}

.site-title{
font-size:24px;
font-weight:700;
letter-spacing:.14em;
text-transform:uppercase;
background:
linear-gradient(120deg,#38bdf8,#4ade80);
-webkit-background-clip:text;
color:transparent;
}

/* CARD */

.rn-wrap{
width:100%;
max-width:480px;
padding:10px 18px 26px;
}

.rn-card{
width:100%;
position:relative;
overflow:hidden;
border-radius:35px;
padding:35px 25px;

background:
linear-gradient(145deg,
rgba(15,23,42,.98),
rgba(2,6,23,.98));

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 0 2px rgba(74,222,128,0.2),
0 20px 80px rgba(0,0,0,.9);
}

/* GLOW EFFECT */

.rn-card::before{
content:"";
position:absolute;
top:-150px;
left:-150px;
width:320px;
height:320px;
background:radial-gradient(circle,
rgba(74,222,128,0.22),
transparent 70%);
}

.rn-card::after{
content:"";
position:absolute;
bottom:-150px;
right:-150px;
width:320px;
height:320px;
background:radial-gradient(circle,
rgba(56,189,248,0.22),
transparent 70%);
}

.rn-title{
text-align:center;
margin-bottom:20px;
}

.rn-title h1{
font-size:26px;
letter-spacing:.28em;
text-transform:uppercase;
color:#facc15;
}

.rn-form{
display:flex;
flex-direction:column;
gap:14px;
}

.rn-field{
position:relative;
border-radius:999px;
padding:15px 18px 15px 48px;
background:#111827;
border:2px solid rgba(74,222,128,0.25);
transition:.3s;
}

.rn-field:focus-within{
border-color:#4ade80;
box-shadow:0 0 15px rgba(74,222,128,0.4);
}

.rn-field input{
width:100%;
border:none;
outline:none;
background:transparent;
color:#e5f0ff;
font-size:14px;
}

.rn-icon{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
font-size:16px;
}

.rn-eye{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
font-size:11px;
color:#bbf7d0;
cursor:pointer;
}

.rn-btn{
width:100%;
padding:18px;
margin-top:10px;
border:none;
border-radius:999px;
font-size:18px;
font-weight:800;
cursor:pointer;

background:
linear-gradient(90deg,
#facc15,
#fde047);

color:black;

transition:.35s;
}

.rn-btn:hover{
transform:translateY(-2px) scale(1.02);
box-shadow:0 10px 30px rgba(250,204,21,.35);
}

</style>

</head>

<body>

<header class="top-header">

<img src="assets/logo.png"
class="logo-main">

<h1 class="site-title">
IBO COIN
</h1>

</header>

<div class="rn-wrap">

<div class="rn-card">

<div class="rn-title">
<h1>🔑 LOGIN</h1>
</div>

<form id="loginForm" class="rn-form">

<div>

<label>
Username or Email
</label>

<div class="rn-field">

<span class="rn-icon">👤</span>

<input
id="username"
type="text"
required
placeholder="Enter username or email" />

</div>

</div>

<div>

<label>
Password
</label>

<div class="rn-field">

<span class="rn-icon">🔒</span>

<input
id="password"
type="password"
required />

<span
class="rn-eye"
id="togglePassword">

SHOW

</span>

</div>

</div>

<button
type="submit"
class="rn-btn">

LOGIN NOW

</button>

</form>

<div style="
text-align:center;
margin-top:20px;
font-size:13px;
position:relative;
z-index:5;
">

Don't have an account?

<a href="registration.html"
style="
color:#facc15;
font-weight:bold;
text-decoration:none;
margin-left:4px;
">

Register Here

</a>

</div>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

/* CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyCJy6aqn6xUZrL2uDa1jDRYOmyAk--zlFw",

authDomain: "ibon-f2c25.firebaseapp.com",

projectId: "ibon-f2c25",

storageBucket: "ibon-f2c25.firebasestorage.app",

messagingSenderId: "709726773992",

appId: "1:709726773992:web:394c54e6c558a8b21d5f5d"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* AUTO USERNAME FILL */

/* AUTO USERNAME FILL */

const params =
new URLSearchParams(window.location.search);

const user =
params.get("user");

if(user){

document.getElementById("username").value =
decodeURIComponent(user);

}

/* PASSWORD SHOW */

document
.getElementById("togglePassword")
.addEventListener("click",function(){

const passInput =
document.getElementById("password");

if(passInput.type === "password"){

passInput.type = "text";

this.innerText = "HIDE";

}else{

passInput.type = "password";

this.innerText = "SHOW";

}

});

/* LOGIN */

document
.getElementById("loginForm")
.addEventListener("submit",async function(e){

e.preventDefault();

const username =
document.getElementById("username")
.value.trim();

const password =
document.getElementById("password")
.value.trim();

if(username === "" || password === ""){

alert("Please Fill All Fields");

return;

}

try{

/* SEARCH USER */

let q;

if(username.includes("@")){

q = query(
collection(db,"users"),
where("email","==",username)
);

}else{

q = query(
collection(db,"users"),
where("username","==",username)
);

}

const snap =
await getDocs(q);

if(snap.empty){

alert("User Not Found");

return;

}

let foundUser = null;

snap.forEach(doc=>{

foundUser = doc.data();

});

/* PASSWORD CHECK */

if(foundUser.password !== password){

alert("Wrong Password");

return;

}

/* SAVE LOGIN */

localStorage.setItem(
"currentUser",
JSON.stringify(foundUser)
);

/* SUCCESS */

alert(
"✅ Login Successful"
);

/* REDIRECT */

window.location.href =
"dashboard.html";

}
catch(error){

console.log(error);

alert(error.message);

}

});

</script>

</body>
</html>
