<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>IBON - Global Registration</title>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--card2:#111827;
--gold:#facc15;
--green:#4ade80;
--blue:#38bdf8;
--red:#fb7185;
--text:#e5f0ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,sans-serif;
font-size:14px;
}

body{
background:
radial-gradient(circle at top,#0f172a,#020617 60%);
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

/* HEADER */

.top-header{
width:100%;
padding:18px 20px;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
z-index:999;
}

.logo-main{
width:72px;
height:72px;
border-radius:50%;
object-fit:cover;
box-shadow:0 0 25px rgba(74,222,128,0.7);
}

.site-title{
font-size:34px;
font-weight:800;
letter-spacing:4px;
background:linear-gradient(90deg,#38bdf8,#4ade80,#facc15);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* MAIN */

.register-wrapper{
width:100%;
display:flex;
justify-content:center;
padding:40px 18px 60px;
}

.register-card{
width:100%;
max-width:580px;
position:relative;
overflow:hidden;
border-radius:35px;
padding:35px 25px;
background:
linear-gradient(145deg,
rgba(15,23,42,.98),
rgba(2,6,23,.98));

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 0 2px rgba(74,222,128,0.2),
0 20px 80px rgba(0,0,0,.9);
}

/* GLOW */

.register-card::before{
content:"";
position:absolute;
top:-150px;
left:-150px;
width:320px;
height:320px;
background:radial-gradient(circle,
rgba(74,222,128,0.22),
transparent 70%);
}

.register-card::after{
content:"";
position:absolute;
bottom:-150px;
right:-150px;
width:320px;
height:320px;
background:radial-gradient(circle,
rgba(56,189,248,0.22),
transparent 70%);
}

/* TITLE */

.form-title{
text-align:center;
margin-bottom:28px;
position:relative;
z-index:2;
}

.form-title h1{
font-size:33px;
font-weight:800;
letter-spacing:3px;
color:var(--gold);
margin-bottom:10px;
}

.form-title p{
font-size:15px;
opacity:.8;
}

/* FORM */

form{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
gap:18px;
}

.row{
display:flex;
gap:15px;
}

.row .field-wrap{
flex:1;
}

.field-label{
font-size:14px;
margin-bottom:8px;
display:block;
color:#dbeafe;
}

.field{
position:relative;
border-radius:999px;
padding:15px 18px 15px 48px;
background:#111827;
border:2px solid rgba(74,222,128,0.25);
transition:.3s;
}

.field:focus-within{
border-color:var(--green);
box-shadow:0 0 15px rgba(74,222,128,0.4);
}

.field input,
.field select{
width:100%;
border:none;
outline:none;
background:transparent;
color:white;
font-size:16px;
}

.field select{
appearance:none;
}

.field input::placeholder{
color:#94a3b8;
}

.icon{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
font-size:18px;
}

/* PASSWORD */

.password-strength,
.password-match{
font-size:13px;
margin-top:5px;
padding-left:5px;
}

/* CHECKBOX */

.check-wrap{
display:flex;
align-items:flex-start;
gap:12px;
margin-top:10px;
font-size:15px;
line-height:1.5;
}

.check-wrap input{
width:24px;
height:24px;
accent-color:var(--green);
margin-top:2px;
}

/* BUTTON */

.register-btn{
width:100%;
padding:18px;
margin-top:10px;
border:none;
border-radius:999px;
font-size:18px;
font-weight:800;
cursor:pointer;

background:
linear-gradient(90deg,
#facc15,
#fde047);

color:black;

transition:.35s;
}

.register-btn:hover{
transform:translateY(-2px) scale(1.02);
box-shadow:0 10px 30px rgba(250,204,21,.35);
}

/* LOGIN */

.login-link{
text-align:center;
margin-top:22px;
font-size:15px;
}

.login-link a{
color:var(--green);
font-weight:bold;
}

/* SUCCESS */

.success-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.93);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.success-card{
max-width:420px;
width:100%;
text-align:center;
padding:45px 30px;
border-radius:35px;

background:
linear-gradient(145deg,
#0f172a,
#020617);

border:2px solid rgba(255,255,255,0.1);

transform-style:preserve-3d;
animation:popup3d .7s ease;

box-shadow:
0 20px 60px rgba(0,0,0,.8),
0 0 50px rgba(74,222,128,.4),
inset 0 0 20px rgba(255,255,255,.05);
}

@keyframes popup3d{

0%{
transform:
perspective(1000px)
rotateX(30deg)
scale(.5);
opacity:0;
}

100%{
transform:
perspective(1000px)
rotateX(0deg)
scale(1);
opacity:1;
}

}

.success-icon{
font-size:80px;
margin-bottom:15px;
}

.success-title{
font-size:30px;
font-weight:800;
color:var(--green);
margin-bottom:15px;
}

.success-text{
font-size:18px;
line-height:1.7;
}

.success-btn{
margin-top:25px;
padding:16px 35px;
border:none;
border-radius:999px;
font-size:17px;
font-weight:bold;
cursor:pointer;
background:var(--gold);
color:black;
}

/* MOBILE */
/* PC FIX */
@media(min-width:651px){

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

/* Country + Mobile আলাদা row */
.row:nth-child(3){
grid-template-columns:1fr 1fr;
}

/* Password row */
.row:nth-child(4){
grid-template-columns:1fr 1fr;
}

}
/* PC FIX */
@media(min-width:651px){

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

/* Country + Mobile আলাদা row */
.row:nth-child(3){
grid-template-columns:1fr 1fr;
}

/* Password row */
.row:nth-child(4){
grid-template-columns:1fr 1fr;
}

}

@media(max-width:650px){

.site-title{
font-size:28px;
}

.register-card{
padding:28px 18px;
border-radius:28px;
}

.row{
flex-direction:column;
gap:18px;
}

.form-title h1{
font-size:28px;
}

.register-btn{
font-size:17px;
padding:19px;
}

}


</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, getDocs, collection, query, where, arrayUnion, increment, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJy6aqn6xUZrL2uDa1jDRYOmyAk--zlFw",
  authDomain: "ibon-f2c25.firebaseapp.com",
  projectId: "ibon-f2c25",
  storageBucket: "ibon-f2c25.firebasestorage.app",
  messagingSenderId: "709726773992",
  appId: "1:709726773992:web:394c54e6c558a8b21d5f5d",
  measurementId: "G-J9PFXLJ2DW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* AUTO REFERRAL */
window.addEventListener("load",()=>{
  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");
  if(ref){
    document.getElementById("sponsor").value = decodeURIComponent(ref);
  }
});

/* PASSWORD STRENGTH */
const password = document.getElementById("password");
const passwordStrength = document.getElementById("passwordStrength");
password.addEventListener("input",()=>{
  const val = password.value;
  if(val.length < 6){
    passwordStrength.innerHTML = "❌ Weak Password";
    passwordStrength.style.color = "#fb7185";
  } else if(val.length < 8){
    passwordStrength.innerHTML = "⚠ Medium Password";
    passwordStrength.style.color = "#facc15";
  } else{
    passwordStrength.innerHTML = "✅ Strong Password";
    passwordStrength.style.color = "#4ade80";
  }
});

/* PASSWORD MATCH */
const confirmPassword = document.getElementById("confirmPassword");
const passwordMatch = document.getElementById("passwordMatch");
confirmPassword.addEventListener("input",()=>{
  if(confirmPassword.value === password.value){
    passwordMatch.innerHTML = "✅ Password Matched";
    passwordMatch.style.color = "#4ade80";
  } else{
    passwordMatch.innerHTML = "❌ Password Not Matched";
    passwordMatch.style.color = "#fb7185";
  }
});

/* REGISTER */
document.getElementById("registerForm").addEventListener("submit", async function(e){
  e.preventDefault();
  
  if(!document.getElementById("terms").checked){
    alert("Please Accept Terms & Conditions");
    return;
  }
  
  const fullName = document.getElementById("fullName").value.trim();
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const country = document.getElementById("country").value;
  const mobile = document.getElementById("mobile").value.trim();
  const sponsor = document.getElementById("sponsor").value.trim();
  const pass = password.value;
  const confirmPass = confirmPassword.value;
  
  if(pass !== confirmPass){
    alert("Password Not Matched");
    return;
  }
  
  const btn = document.querySelector(".register-btn");
  btn.innerHTML = "Creating Account...";
  btn.disabled = true;
  
  try{
    /* CHECK USERNAME EXISTS */
    const usernameQuery = query(collection(db,"users"), where("username","==",username));
    const usernameSnap = await getDocs(usernameQuery);
    if(!usernameSnap.empty){
      alert("Username Already Exists");
      btn.innerHTML = "REGISTER NOW";
      btn.disabled = false;
      return;
    }
    
    /* CHECK EMAIL EXISTS */
    const emailQuery = query(collection(db,"users"), where("email","==",email));
    const emailSnap = await getDocs(emailQuery);
    if(!emailSnap.empty){
      alert("Email Already Registered");
      btn.innerHTML = "REGISTER NOW";
      btn.disabled = false;
      return;
    }
    
    /* CHECK SPONSOR */
    let sponsorUID = "";
    if(sponsor){
      const sponsorQuery = query(collection(db,"users"), where("username","==",sponsor));
      const sponsorSnap = await getDocs(sponsorQuery);
      if(sponsorSnap.empty){
        alert("Referral Username Not Found");
        btn.innerHTML = "REGISTER NOW";
        btn.disabled = false;
        return;
      }
      sponsorSnap.forEach(docu=>{
        sponsorUID = docu.id;
      });
    }
    
    /* CREATE AUTH - Password শুধু এখানে, Firestore এ save হবে না */
    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
    const user = userCredential.user;
    
    const referralLink = window.location.origin + "/registration.html?ref=" + username;
    
    /* SAVE USER DATA - FIX 3: Admin role + password remove */
    await setDoc(doc(db,"users",user.uid), {
      uid:user.uid,
      role: username === "ibonadmin" ? "admin" : "user", // শুধু ibonadmin admin হবে
      fullName:fullName,
      username:username,
      email:email,
      country:country,
      mobile:mobile,
      // password:pass, <-- মুছে দিলাম, বিপদজনক
      sponsor:sponsor || "",
      sponsorUID:sponsorUID || "",
      referralLink:referralLink,
      referrals:0,
      referralUsers:[],
      ibon:100000,
      balance:0,
      usdt:0,
      vip:"VIP 1",
      kyc:false,
      status:"active",
      rank:"Starter",
      totalDeposit:0,
      totalWithdraw:0,
      totalReferral:0,
      teamBusiness:0,
      directIncome:0,
      levelIncome:0,
      matchingIncome:0,
      rankReward:0,
      profilePhoto:"",
      joined: new Date().toLocaleString(),
      createdAt: new Date().toISOString()
    });
    
    /* REFERRAL BONUS */
    if(sponsorUID){
      const sponsorRef = doc(db,"users",sponsorUID);
      await updateDoc(sponsorRef, {
        referrals: increment(1),
        totalReferral: increment(1),
        ibon: increment(5000),
        directIncome: increment(5000),
        teamBusiness: increment(5000),
        referralUsers: arrayUnion({
          username: username,
          email: email,
          joined: new Date().toLocaleString(),
          bonus: 5000
        })
      });
      
      await addDoc(collection(db,"transactions"), {
        uid:sponsorUID,
        username:sponsor,
        type:"Referral Bonus",
        amount:5000,
        coin:"IBON",
        fromUser:username,
        text: `${username} joined using your referral link`,
        date:new Date().toLocaleString(),
        timestamp:Date.now()
      });
    }
    
    /* SAVE LOGIN */
    localStorage.setItem("loginEmail", email);
    localStorage.setItem("loginUsername", username);
    localStorage.setItem("currentUser", JSON.stringify({
      uid:user.uid,
      role: username === "ibonadmin" ? "admin" : "user",
      fullName:fullName,
      username:username,
      email:email,
      country:country,
      mobile:mobile,
      sponsor:sponsor,
      referralLink:referralLink,
      ibon:100000,
      usdt:0,
      vip:"VIP 1"
    }));
    
    /* SUCCESS */
    document.getElementById("successOverlay").style.display = "flex";
    document.getElementById("registerForm").reset();
    btn.innerHTML = "REGISTER NOW";
    btn.disabled = false;
    
    /* REDIRECT - FIX 1: Auto login page with username */
    setTimeout(()=>{
      window.location.href = `login.html?username=${encodeURIComponent(username)}`;
    },2000);
    
  }catch(error){
    console.log(error);
    if(error.code === "auth/email-already-in-use"){
      alert("Email Already Registered");
    }else{
      alert(error.message);
    }
    btn.innerHTML = "REGISTER NOW";
    btn.disabled = false;
  }
});

window.goLogin = function(){
  const username = document.getElementById("username").value;
  window.location.href = `login.html?username=${encodeURIComponent(username)}`;
}

/* COUNTRY CODE AUTO FILL */

window.setCountryCode = function(){
  const code = document.getElementById("country").value;
  const codeShow = document.getElementById("mobileCodeShow");
  if(codeShow) codeShow.innerText = code;
}

window.togglePass = function(inputId, iconId){
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if(input.type === "password"){
    input.type = "text";
    icon.innerText = "🙈";
  } else {
    input.type = "password";
    icon.innerText = "👁️";
  }
}

/* PAGE LOAD DEFAULT */

window.addEventListener("load",()=>{

setCountryCode();

});
</script>
